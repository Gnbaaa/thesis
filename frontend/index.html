<!doctype html>
<html lang="mn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Тэжээвэр амьтдын платформ</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('app-theme');
          document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
          document.documentElement.style.colorScheme = t === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
          document.documentElement.style.colorScheme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <!-- OAuth: hash (#accessToken=…) React/StrictMode-оос өмнө боловсруулна — redirect найдвартай. -->
    <script>
      (function () {
        var path = location.pathname.replace(/\/$/, '') || '/';
        if (!path.endsWith('/auth/callback')) return;
        var h = location.hash;
        if (!h || h.charAt(0) !== '#' || h.length < 2) return;
        var raw = h.slice(1);
        var accessToken = null;
        var refreshToken = null;
        raw.split('&').forEach(function (part) {
          var eq = part.indexOf('=');
          if (eq === -1) return;
          var key = part.slice(0, eq);
          var value = part.slice(eq + 1);
          try {
            value = decodeURIComponent(value);
          } catch (e) {}
          if (key === 'accessToken') accessToken = value;
          if (key === 'refreshToken') refreshToken = value;
        });
        if (accessToken) {
          try {
            localStorage.setItem('accessToken', accessToken);
          } catch (e) {}
        }
        if (refreshToken) {
          try {
            localStorage.setItem('refreshToken', refreshToken);
          } catch (e) {}
        }
        var origin = location.origin;
        if (accessToken) {
          location.replace(origin + '/pets');
        } else {
          location.replace(origin + '/login?error=google');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
